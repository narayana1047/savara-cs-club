<!DOCTYPE html>
<html>
<body>
<input id="na" placeholder="Enter name"></input>
<input id="price"></input>

<button onclick=addProduct()>Add</button>

<div id="list"></div>

<script src="../js/app.js"></script>
<script>
checkAdmin("admin");
loadProducts();
async function addProduct() {
    const res = await fetch(API + "/api/products", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: na.value,
      price: price.value
    })
    });
    loadProducts();
    }
</script>

</body>
</html>
