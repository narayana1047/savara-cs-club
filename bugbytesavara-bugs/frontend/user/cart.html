<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="content">
<h2>Cart</h2>

<p></p>

<div id="cartItems"></div>
</div>

<script>
const cart = JSON.parse(localStorage.getItem("cartItems")) || [];
cart.forEach(p => {
    cartItems.innerHTML += `
      <div class="product">
        <h4>${p.name}</h4>
        <p>₹${p.price * 2}</p>
      </div>
    `;
  });
  if(cart.length===0){
    p.innerHTML+= "cart is empty"
  }
</script>

</body>
</html>
